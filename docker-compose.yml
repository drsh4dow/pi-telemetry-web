services:
  pi-telemetry-web:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /data
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: change-this-to-a-random-32-byte-secret-before-use
    volumes:
      - pi-telemetry-data:/data

volumes:
  pi-telemetry-data:
